name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build tools
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm

      - name: Build (${{ matrix.platform }})
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.pacman
            release/*.tar.gz
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aur-publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "pkgver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get sha256sum of .pacman file
        id: sha256
        run: |
          url="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/anisocial-desktop-${{ steps.version.outputs.pkgver }}.pacman"
          echo "Downloading: $url"
          curl -fSL "$url" -o package.pacman
          sha256=$(sha256sum package.pacman | awk '{print $1}')
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "SHA256: $sha256"

      - name: Prepare PKGBUILD
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.pkgver }}/" .aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" .aur/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${{ steps.sha256.outputs.sha256 }}')/" .aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: anisocial-desktop-bin
          pkgbuild: ./.aur/PKGBUILD
          commit_username: Vando
          commit_email: vando.02800@tutamail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.version.outputs.pkgver }}"
          force_push: true
