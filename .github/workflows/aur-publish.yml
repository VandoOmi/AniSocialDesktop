name: Update AUR Package

on:
  release:
    types: [published]

jobs:
  aur-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "pkgver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get sha256sum of .pacman file
        id: sha256
        run: |
          url="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/anisocial-desktop-${{ steps.version.outputs.pkgver }}.pacman"
          echo "Downloading: $url"
          curl -fSL "$url" -o package.pacman
          sha256=$(sha256sum package.pacman | awk '{print $1}')
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "SHA256: $sha256"

      - name: Prepare PKGBUILD
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.pkgver }}/" .aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" .aur/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${{ steps.sha256.outputs.sha256 }}')/" .aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: anisocial-desktop-bin
          pkgbuild: ./.aur/PKGBUILD
          commit_username: Vando
          commit_email: vando.02800@tutamail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.version.outputs.pkgver }}"
          force_push: true
